---
# ─────────────────────────────────────────────────────────────
# BOOTSTRAP APPROLE (using root token — one time only)
# ─────────────────────────────────────────────────────────────

- name: Enable AppRole auth method
  ansible.builtin.command: vault auth enable approle
  environment: "{{ vault_env }}"
  when: auth_json['approle/'] is not defined
  no_log: true

- name: Write bootstrap policy for AppRole
  ansible.builtin.template:
    src: bootstrap-policy.hcl.j2
    dest: /tmp/bootstrap-policy.hcl
    mode: "0600"

- name: Apply bootstrap policy
  ansible.builtin.command: >
    vault policy write vault-admin /tmp/bootstrap-policy.hcl
  environment: "{{ vault_env }}"
  no_log: true
  register: policy_apply
  changed_when: "'Success' in policy_apply.stdout or policy_apply.rc == 0"

- name: Create AppRole role
  ansible.builtin.command: >
    vault write auth/approle/role/vault-admin
      token_policies="vault-admin"
      token_ttl=1h
      token_max_ttl=4h
      secret_id_ttl=720h
  environment: "{{ vault_env }}"
  when: not approle_file_stat.stat.exists
  no_log: true

- name: Fetch AppRole role-id
  ansible.builtin.command: >
    vault read -format=json auth/approle/role/vault-admin/role-id
  register: approle_role_id_raw
  environment: "{{ vault_env }}"
  when: not approle_file_stat.stat.exists
  no_log: true

- name: Fetch AppRole secret-id
  ansible.builtin.command: >
    vault write -format=json -f auth/approle/role/vault-admin/secret-id
  register: approle_secret_id_raw
  environment: "{{ vault_env }}"
  when: not approle_file_stat.stat.exists
  no_log: true

- name: Persist AppRole credentials
  ansible.builtin.copy:
    dest: "{{ vault_approle_file }}"
    owner: root
    group: root
    mode: "0600"
    content: |
      {
        "role_id":   "{{ (approle_role_id_raw.stdout  | from_json).data.role_id }}",
        "secret_id": "{{ (approle_secret_id_raw.stdout | from_json).data.secret_id }}"
      }
  when: not approle_file_stat.stat.exists
  no_log: true

- name: Re-check AppRole credentials file after bootstrap
  ansible.builtin.stat:
    path: "{{ vault_approle_file }}"
  register: approle_file_stat

# ─────────────────────────────────────────────────────────────
# LOAD APPROLE CREDENTIALS
# ─────────────────────────────────────────────────────────────

- name: Fail if AppRole credentials file is missing
  ansible.builtin.fail:
    msg: "AppRole credentials file {{ vault_approle_file }} not found. Bootstrap must have failed."
  when: not approle_file_stat.stat.exists

- name: Load AppRole credentials
  ansible.builtin.slurp:
    src: "{{ vault_approle_file }}"
  register: approle_raw
  no_log: true

- name: Parse AppRole credentials
  ansible.builtin.set_fact:
    approle_creds: "{{ approle_raw.content | b64decode | from_json }}"
  no_log: true

- name: Remove bootstrap policy file
  ansible.builtin.file:
    path: /tmp/bootstrap-policy.hcl
    state: absent

# ─────────────────────────────────────────────────────────────
# LOGIN WITH APPROLE — get a scoped, short-lived token
# ─────────────────────────────────────────────────────────────

- name: Login with AppRole
  ansible.builtin.uri:
    url: "https://{{ vault_dns_name }}:8200/v1/auth/approle/login"
    method: POST
    body_format: json
    body:
      role_id: "{{ approle_creds.role_id }}"
      secret_id: "{{ approle_creds.secret_id }}"
    status_code: 200
  register: approle_login
  no_log: true

- name: Set Vault environment using AppRole token
  ansible.builtin.set_fact:
    vault_env:
      VAULT_ADDR: "https://{{ vault_dns_name }}:8200"
      VAULT_TOKEN: "{{ approle_login.json.auth.client_token }}"
  no_log: true