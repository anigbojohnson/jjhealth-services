---
# ─────────────────────────────────────────────────────────────
# CHECK EXISTING SECRETS ENGINES
# ─────────────────────────────────────────────────────────────

- name: Login using AWS auth
  ansible.builtin.command: >
    vault login
    -method=aws
    -format=json
    role={{ vault_aws_auth_role }}
  environment:
    VAULT_ADDR: "https://{{ vault_dns_name }}:8200"
  register: aws_login
  changed_when: false
  failed_when: false
  no_log: true

- name: Extract client token
  ansible.builtin.set_fact:
    vault_token: "{{ (aws_login.stdout | from_json).auth.client_token }}"
  when: aws_login.rc == 0
  no_log: true

- name: Retrieve root token from Secrets Manager
  ansible.builtin.set_fact:
    vault_token: "{{ lookup(
      'amazon.aws.secretsmanager_secret',
      vault_secret_name_root_token,
      region=vault_aws_region
    ) }}"
  when: aws_login.rc != 0
  no_log: true

- name: Save Vault token
  ansible.builtin.set_fact:
    vault_token: "{{ (vault_login.stdout | from_json).auth.client_token }}"
  no_log: true

- name: Set Vault environment with root token
  ansible.builtin.set_fact:
    vault_login_credentials:
      VAULT_ADDR: "https://{{ vault_dns_name }}:8200"
      VAULT_TOKEN: "{{ vault_token }}"
  no_log: true

- name: Check secrets engines
  ansible.builtin.command: vault secrets list -format=json
  environment: "{{ vault_login_credentials }}"
  register: secrets_list
  changed_when: false

- name: Parse secrets engines
  ansible.builtin.set_fact:
    secrets_json: "{{ secrets_list.stdout | from_json }}"
