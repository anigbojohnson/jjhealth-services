---
# ─────────────────────────────────────────────────────────────
# CHECK IF APPROLE ALREADY BOOTSTRAPPED
# ─────────────────────────────────────────────────────────────

- name: Check if AppRole credentials file exists
  ansible.builtin.stat:
    path: "{{ vault_approle_file }}"
  register: approle_file_stat

# ─────────────────────────────────────────────────────────────
# RETRIEVE ROOT TOKEN FROM SECRETS MANAGER (bootstrap only)
# ─────────────────────────────────────────────────────────────

- name: Retrieve root token from Secrets Manager
  ansible.builtin.set_fact:
    vault_root_token: "{{ lookup(
      'amazon.aws.secretsmanager_secret',
      vault_secret_name_root_token,
      region=vault_aws_region
    ) }}"
  no_log: true

- name: Set Vault environment with root token
  ansible.builtin.set_fact:
    vault_env:
      VAULT_ADDR: "https://127.0.0.1:8200"
      VAULT_TOKEN: "{{ vault_root_token }}"
  no_log: true

# ─────────────────────────────────────────────────────────────
# CHECK AUTH METHODS
# ─────────────────────────────────────────────────────────────

- name: Check auth methods
  ansible.builtin.command: vault auth list -format=json
  environment: "{{ vault_env }}"
  register: auth_list
  changed_when: false

- name: Parse auth methods
  ansible.builtin.set_fact:
    auth_json: "{{ auth_list.stdout | from_json }}"

# ─────────────────────────────────────────────────────────────
# CHECK EXISTING SECRETS ENGINES
# ─────────────────────────────────────────────────────────────

- name: Check token lookup
  ansible.builtin.command: vault token lookup
  environment: "{{ vault_env }}"
  register: token_lookup
  changed_when: false

- debug:
    var: token_lookup.stdout

- name: Check secrets engines
  ansible.builtin.command: vault secrets list -format=json
  environment: "{{ vault_env }}"
  register: secrets_list
  changed_when: false

- name: Parse secrets engines
  ansible.builtin.set_fact:
    secrets_json: "{{ secrets_list.stdout | from_json }}"