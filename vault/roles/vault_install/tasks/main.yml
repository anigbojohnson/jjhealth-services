---
# ─────────────────────────────────────────────────────────────
# INSTALL DEPENDENCIES
# ─────────────────────────────────────────────────────────────
- name: Install operating system and Python dependencies
  ansible.builtin.import_tasks: dependencies.yml

# ─────────────────────────────────────────────────────────────
# DOWNLOAD + INSTALL VAULT
# ─────────────────────────────────────────────────────────────
- name: Download and install the HashiCorp Vault binary
  ansible.builtin.import_tasks: install.yml

# ─────────────────────────────────────────────────────────────
# CREATE VAULT USER/GROUP
# ─────────────────────────────────────────────────────────────
- name: Create the Vault system user and group
  ansible.builtin.import_tasks: user.yml

# ─────────────────────────────────────────────────────────────
# CREATE REQUIRED DIRECTORIES
# ─────────────────────────────────────────────────────────────

- name: Create Vault configuration, data, and log directories
  ansible.builtin.import_tasks: directories.yml

# ─────────────────────────────────────────────────────────────
# VAULT CONFIGURATION
# ─────────────────────────────────────────────────────────────

- name: Configure Vault and install the systemd service
  ansible.builtin.import_tasks: configure.yml

# ─────────────────────────────────────────────────────────────
# WAIT FOR VAULT API
# ─────────────────────────────────────────────────────────────
- name: Enable, start, and verify the Vault service
  ansible.builtin.import_tasks: service.yml

# ─────────────────────────────────────────────────────────────
# STORE RECOVERY KEYS IN SECRETS MANAGER
# ─────────────────────────────────────────────────────────────
- name: Initialize Vault and store bootstrap secrets
  ansible.builtin.import_tasks: initialize.yml

# ─────────────────────────────────────────────────────────────
# ADMINISTRATIVE POLICIES AND AUTHENTICATION 
# ─────────────────────────────────────────────────────────────

- name: Configure Vault administrator policies and authentication
  ansible.builtin.import_tasks: admin-role.yml