---
# ─────────────────────────────────────────────────────────────
# WAIT FOR VAULT TO BE UNSEALED (auto-unseal via KMS)
# ─────────────────────────────────────────────────────────────

- name: Wait for Vault to be unsealed
  ansible.builtin.uri:
    url: "http://127.0.0.1:8200/v1/sys/health"
    status_code: [200]
  register: vault_health
  retries: 15
  delay: 3
  until: vault_health.status == 200
  environment:
    VAULT_ADDR: "http://127.0.0.1:8200"

# ─────────────────────────────────────────────────────────────
# CHECK IF APPROLE ALREADY BOOTSTRAPPED
# ─────────────────────────────────────────────────────────────

- name: Check if AppRole credentials file exists
  ansible.builtin.stat:
    path: "{{ vault_approle_file }}"
  register: approle_file_stat

# ─────────────────────────────────────────────────────────────
# RETRIEVE ROOT TOKEN FROM SECRETS MANAGER (bootstrap only)
# ─────────────────────────────────────────────────────────────

- name: Retrieve root token from Secrets Manager
  set_fact:
    vault_root_token: "{{ lookup(
      'amazon.aws.secretsmanager_secret',
      vault_secret_name_root_token,
      region=vault_aws_region
    ) }}"
  no_log: true

- name: Display root token
  debug:
    var: vault_root_token

    
- name: Retrieve root token
  set_fact:
    vault_root_token: "{{ lookup(
      'amazon.aws.secretsmanager_secret',
      vault_secret_name_root_token,
      region=vault_aws_region
    ) }}"


- name: Set Vault environment with root token
  ansible.builtin.set_fact:
    vault_env:
      VAULT_ADDR: "http://127.0.0.1:8200"
      VAULT_TOKEN: "{{ vault_root_token }}"
  no_log: true


# ─────────────────────────────────────────────────────────────
# CHECK AUTH METHODS
# ─────────────────────────────────────────────────────────────

- name: Check auth methods
  ansible.builtin.command: vault auth list -format=json
  environment: "{{ vault_env }}"
  register: auth_list
  changed_when: false

- name: Parse auth methods
  ansible.builtin.set_fact:
    auth_json: "{{ auth_list.stdout | from_json }}"

    
# ─────────────────────────────────────────────────────────────
# BOOTSTRAP APPROLE (using root token — one time only)
# ─────────────────────────────────────────────────────────────

- name: Enable AppRole auth method
  ansible.builtin.command: vault auth enable approle
  environment: "{{ vault_env }}"
  when: auth_json['approle/'] is not defined
  no_log: true

- name: Write bootstrap policy for AppRole
  ansible.builtin.template:
    src: bootstrap-policy.hcl.j2
    dest: /tmp/bootstrap-policy.hcl
    mode: "0600"

- name: Apply bootstrap policy
  ansible.builtin.command: >
    vault policy write vault-admin /tmp/bootstrap-policy.hcl
  environment: "{{ vault_env }}"
  no_log: true
  register: policy_apply
  changed_when: "'Success' in policy_apply.stdout or policy_apply.rc == 0"

- name: Remove bootstrap policy file
  ansible.builtin.file:
    path: /tmp/bootstrap-policy.hcl
    state: absent

- name: Create AppRole role
  ansible.builtin.command: >
    vault write auth/approle/role/vault-admin
      token_policies="vault-admin"
      token_ttl=1h
      token_max_ttl=4h
      secret_id_ttl=720h
  environment: "{{ vault_env }}"
  when: not approle_file_stat.stat.exists
  no_log: true

- name: Fetch AppRole role-id
  ansible.builtin.command: >
    vault read -format=json auth/approle/role/vault-admin/role-id
  register: approle_role_id_raw
  environment: "{{ vault_env }}"
  when: not approle_file_stat.stat.exists
  no_log: true

- name: Fetch AppRole secret-id
  ansible.builtin.command: >
    vault write -format=json -f auth/approle/role/vault-admin/secret-id
  register: approle_secret_id_raw
  environment: "{{ vault_env }}"
  when: not approle_file_stat.stat.exists
  no_log: true

- name: Persist AppRole credentials
  ansible.builtin.copy:
    dest: "{{ vault_approle_file }}"        # e.g. /etc/vault/approle.json
    owner: root
    group: root
    mode: "0600"
    content: |
      {
        "role_id":   "{{ (approle_role_id_raw.stdout  | from_json).data.role_id }}",
        "secret_id": "{{ (approle_secret_id_raw.stdout | from_json).data.secret_id }}"
      }
  when: not approle_file_stat.stat.exists
  no_log: true

# ─────────────────────────────────────────────────────────────
# REVOKE ROOT TOKEN AFTER BOOTSTRAP — no longer needed on disk or in Vault
# ─────────────────────────────────────────────────────────────

- name: Revoke root token after bootstrap
  ansible.builtin.command: vault token revoke {{ vault_root_token }}
  environment: "{{ vault_env }}"
  when: not approle_file_stat.stat.exists
  no_log: true

- name: Delete root token from Secrets Manager
  community.aws.secretsmanager_secret:
    name: "{{ vault_secret_name_root_token }}"
    state: absent
    region: "{{ vault_aws_region }}"
  when: not approle_file_stat.stat.exists
# ─────────────────────────────────────────────────────────────
# CHECK EXISTING SECRETS ENGINES
# ─────────────────────────────────────────────────────────────

- name: Check token lookup
  ansible.builtin.command: vault token lookup
  environment: "{{ vault_env }}"
  register: token_lookup
  changed_when: false

- debug:
    var: token_lookup.stdout

- name: Check secrets engines
  ansible.builtin.command: vault secrets list -format=json
  environment: "{{ vault_env }}"
  register: secrets_list
  changed_when: false

- name: Parse secrets engines
  ansible.builtin.set_fact:
    secrets_json: "{{ secrets_list.stdout | from_json }}"

# ─────────────────────────────────────────────────────────────
# LOAD APPROLE CREDENTIALS
# ─────────────────────────────────────────────────────────────

- name: Fail if AppRole credentials file is missing
  ansible.builtin.fail:
    msg: "AppRole credentials file {{ vault_approle_file }} not found. Bootstrap must have failed."
  when: not approle_file_stat.stat.exists and not (vault_approle_file is file)

- name: Re-check AppRole credentials file after bootstrap
  ansible.builtin.stat:
    path: "{{ vault_approle_file }}"
  register: approle_file_stat_post

- name: Fail if AppRole credentials file still missing
  ansible.builtin.fail:
    msg: "AppRole credentials file {{ vault_approle_file }} not found after bootstrap attempt."
  when: not approle_file_stat_post.stat.exists

- name: Load AppRole credentials
  ansible.builtin.slurp:
    src: "{{ vault_approle_file }}"
  register: approle_raw
  no_log: true

- name: Parse AppRole credentials
  ansible.builtin.set_fact:
    approle_creds: "{{ approle_raw.content | b64decode | from_json }}"
  no_log: true

# ─────────────────────────────────────────────────────────────
# LOGIN WITH APPROLE — get a scoped, short-lived token
# ─────────────────────────────────────────────────────────────

- name: Login with AppRole
  ansible.builtin.uri:
    url: "http://127.0.0.1:8200/v1/auth/approle/login"
    method: POST
    body_format: json
    body:
      role_id: "{{ approle_creds.role_id }}"
      secret_id: "{{ approle_creds.secret_id }}"
    status_code: 200
  register: approle_login
  no_log: true

- name: Set Vault environment using AppRole token
  ansible.builtin.set_fact:
    vault_env:
      VAULT_ADDR: "http://127.0.0.1:8200"
      VAULT_TOKEN: "{{ approle_login.json.auth.client_token }}"
  no_log: true

# ─────────────────────────────────────────────────────────────
# ENABLE AWS SECRETS ENGINE
# ─────────────────────────────────────────────────────────────

- name: Enable AWS secrets engine
  ansible.builtin.command: vault secrets enable aws
  environment: "{{ vault_env }}"
  when: secrets_json['aws/'] is not defined

# ─────────────────────────────────────────────────────────────
# CONFIGURE AWS ROOT CREDS
# ─────────────────────────────────────────────────────────────

- name: Configure AWS root credentials
  ansible.builtin.command: >
    vault write aws/config/root
      region="{{ vault_aws_region }}"
  environment: "{{ vault_env }}"
  no_log: true

# ─────────────────────────────────────────────────────────────
# CREATE AWS ROLE
# ─────────────────────────────────────────────────────────────

- name: Create or update AWS role for Terraform in Vault
  ansible.builtin.command: >
    vault write aws/roles/{{ vault_aws_role_name }}
    credential_type=iam_user
    policy_arns={{ vault_aws_role_policy_arns | join(',') }}
  environment: "{{ vault_env }}"

# ─────────────────────────────────────────────────────────────
# CREATE POLICY FILE
# ─────────────────────────────────────────────────────────────

- name: Create Terraform policy file
  ansible.builtin.copy:
    dest: /tmp/terraform-policy.hcl
    content: |
      path "aws/creds/{{ vault_aws_role_name }}" {
        capabilities = ["read"]
      }
    mode: "0600"

# ─────────────────────────────────────────────────────────────
# APPLY POLICY
# ─────────────────────────────────────────────────────────────

- name: Apply Vault policy
  ansible.builtin.command: >
    vault policy write {{ vault_policy_name }} /tmp/terraform-policy.hcl
  environment: "{{ vault_env }}"

- name: Remove temporary policy file
  ansible.builtin.file:
    path: /tmp/terraform-policy.hcl
    state: absent



# ─────────────────────────────────────────────────────────────
# ENABLE JWT AUTH
# ─────────────────────────────────────────────────────────────

- name: Enable JWT auth
  ansible.builtin.command: vault auth enable jwt
  environment: "{{ vault_env }}"
  when: auth_json['jwt/'] is not defined

# ─────────────────────────────────────────────────────────────
# CHECK JWT CONFIG
# ─────────────────────────────────────────────────────────────

- name: Check JWT config
  ansible.builtin.command: vault read auth/jwt/config
  environment: "{{ vault_env }}"
  register: jwt_config
  changed_when: false
  failed_when: false

# ─────────────────────────────────────────────────────────────
# CONFIGURE JWT
# ─────────────────────────────────────────────────────────────

- name: Configure JWT auth
  ansible.builtin.command: >
    vault write auth/jwt/config
      oidc_discovery_url="{{ github_oidc_discovery_url }}"
      bound_issuer="{{ github_oidc_discovery_url }}"
  environment: "{{ vault_env }}"
  when: jwt_config.rc != 0

# ─────────────────────────────────────────────────────────────
# CREATE JWT ROLE
# ─────────────────────────────────────────────────────────────

- name: Create JWT role payload
  ansible.builtin.copy:
    dest: /tmp/jwt-role.json
    mode: "0600"
    content: |
      {
        "role_type": "jwt",
        "bound_audiences": [
          "https://github.com/{{ github_org }}"
        ],
        "user_claim": "sub",
        "bound_claims_type": "glob",
        "bound_claims": {
          "sub": "repo:{{ github_org }}/{{ github_repo }}:*"
        },
        "token_policies": [
          "{{ vault_policy_name }}"
        ],
        "token_ttl": "1h"
      }

- name: Create JWT role
  ansible.builtin.shell: >
      vault write auth/jwt/role/{{ vault_jwt_role_name }}
      @/tmp/jwt-role.json
  environment: "{{ vault_env }}"

- name: Remove JWT role payload
  ansible.builtin.file:
    path: /tmp/jwt-role.json
    state: absent

# ─────────────────────────────────────────────────────────────
# SMOKE TESTS
# ─────────────────────────────────────────────────────────────

- name: Verify AWS role
  ansible.builtin.command: vault read aws/roles/{{ vault_aws_role_name }}
  environment: "{{ vault_env }}"
  changed_when: false

- name: Verify JWT role
  ansible.builtin.command: vault read auth/jwt/role/{{ vault_jwt_role_name }}
  environment: "{{ vault_env }}"
  changed_when: false