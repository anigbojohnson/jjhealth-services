{{- if .Values.configMap.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Values.configMap.name }}-main-config"
  namespace: {{ .Release.Namespace }}
data:
{{- range $key, $value := .Values.configMap.data }}
  {{ $key }}: "{{ $value }}"
{{- end }}
{{- end }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: jjhealth-services-nginx-config
  namespace: {{ .Release.Namespace }}  # or your target namespace
data:
  default.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log;
    pid /run/nginx.pid;

    # Load dynamic modules.
    include /usr/share/nginx/modules/*.conf;

    events {
        worker_connections 1024;
    }

    http {
        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';

        access_log /var/log/nginx/access.log main;

        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        types_hash_max_size 4096;

        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        include /etc/nginx/conf.d/*.conf;

        server {

            listen 80;
            listen [::]:80;
            server_name _;

            root /home/ec2-user/todo-app;
            index index.php index.html index.htm;

            location / {
                try_files $uri $uri/ /index.php?$query_string;
            }

            location /health {
                default_type text/html;
                return 200 "<!DOCTYPE html><p>Web Tier Health Check</p>\n";
            }

            location ~ \.php$ {
                include fastcgi_params;
                fastcgi_pass unix:/run/php-fpm/www.sock;
                fastcgi_index index.php;
                fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            }

        }

    }
