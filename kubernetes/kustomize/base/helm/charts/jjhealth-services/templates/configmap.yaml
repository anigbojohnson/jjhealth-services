{{- if .Values.configMap.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Values.configMap.name }}-main-config"
  namespace: {{ .Release.Namespace }}
data:
{{- range $key, $value := .Values.configMap.data }}
  {{ $key }}: |-
{{ $value | indent 4 }}
{{- end }}
{{- end }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: jjhealth-services-nginx-config
  namespace: {{ .Release.Namespace }}
data:
  default.conf: |
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Optional static root (if serving static files)
        root /usr/share/nginx/html;
        index index.html index.htm;

        # Health endpoint for Kubernetes
        location /health {
            default_type text/html;
            return 200 "<!DOCTYPE html><p>Web Tier Health Check</p>\n";
        }

        # Proxy all other requests to backend service
        location / {
            proxy_pass http://{{ .Values.backend.name }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.backend.service.port }};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
