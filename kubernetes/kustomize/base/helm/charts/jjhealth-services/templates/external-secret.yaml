{{- if .Values.awsSecretsManager.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secret-store
  namespace: development
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.awsSecretsManager.region }}
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: {{ .Values.secret.name }}
            key: AWS_ACCESS_KEY_ID
          secretAccessKeySecretRef:
            name: {{ .Values.secret.name }}
            key: AWS_SECRET_ACCESS_KEY
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.awsSecretsManager.k8sSecretName }}
  namespace: 
spec:
  refreshInterval: {{ .Values.awsSecretsManager.refreshInterval }}
  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore
  target:
    name: {{ .Values.awsSecretsManager.k8sSecretName }}
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.awsSecretsManager.secretName }}
        property: username
    - secretKey: password
      remoteRef:
        key: {{ .Values.awsSecretsManager.secretName }}
        property: password
{{- end }}
