{{- if .Values.awsSecretsManager.enabled }}
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secret-store
  namespace: {{ .Release.Namespace }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.awsSecretsManager.region }}
      auth:
         jwt:  # ← Recommended: IRSA (assumes ESO SA has the IAM role annotation)
           serviceAccountRef:
               name: external-secrets  # ← Change if your ESO is installed in a different SA/namespace
               namespace: external-secrets
    

---
apiVersion:  external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.awsSecretsManager.k8sSecretName }}
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: {{ .Values.awsSecretsManager.refreshInterval }}
  secretStoreRef:
    name: aws-secret-store
    kind: ClusterSecretStore
  target:
    name: {{ .Values.awsSecretsManager.k8sSecretName }}
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.awsSecretsManager.secretName }}
        property: username
    - secretKey: password
      remoteRef:
        key: {{ .Values.awsSecretsManager.secretName }}
        property: password
{{- end }}
