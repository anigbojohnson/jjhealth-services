configMap:
  enabled: true
  name: jjhealth-services
  data:
    APP_NAME: "jjhealth-services"
    APP_ENV: "local"
    APP_DEBUG: "true"
    APP_URL: "http://localhost"
    LOG_CHANNEL: "stack"
    LOG_LEVEL: "debug"

    DB_CONNECTION: "pgsql"
    DB_HOST: "jjhealth-db.cj2seuige0e8.eu-west-2.rds.amazonaws.com"
    DB_PORT: "5432"
    DB_DATABASE: "jjhealth_db"
    DB_SSLMODE: "require"

    BROADCAST_DRIVER: "log"
    CACHE_DRIVER: "file"
    FILESYSTEM_DRIVER: "local"
    QUEUE_CONNECTION: "sync"
    SESSION_DRIVER: "file"
    SESSION_LIFETIME: "120"

    MEMCACHED_HOST: "127.0.0.1"
    REDIS_HOST: "127.0.0.1"
    REDIS_PORT: "6379"

    MAIL_MAILER: "smtp"
    MAIL_HOST: "mailpit"
    MAIL_PORT: "1025"
    MAIL_FROM_ADDRESS: "hello@example.com"
    MAIL_FROM_NAME: "jjhealth-services"

    AWS_DEFAULT_REGION: "eu-west-2"
    AWS_BUCKET: ""
    AWS_USE_PATH_STYLE_ENDPOINT: "false"

    PUSHER_HOST: ""
    PUSHER_PORT: "443"
    PUSHER_SCHEME: "https"
    PUSHER_APP_CLUSTER: "mt1"

    VITE_PUSHER_APP_KEY: ""
    VITE_PUSHER_HOST: ""
    VITE_PUSHER_PORT: "443"
    VITE_PUSHER_SCHEME: "https"
    VITE_PUSHER_APP_CLUSTER: "mt1"

secret:
  enabled: true
  name: jjhealth-services-secret
  data:
    APP_KEY: "base64:7GnfjqQNjGGjUGZ+KedvPjm9DKItAzoU47YuNWruKrA="
    REDIS_PASSWORD: ""
    MAIL_USERNAME: ""
    MAIL_PASSWORD: ""
    AWS_ACCESS_KEY_ID: ""
    AWS_SECRET_ACCESS_KEY: ""
    PUSHER_APP_ID: ""
    PUSHER_APP_KEY: ""
    PUSHER_APP_SECRET: ""

awsSecretsManager:
  enabled: true
  region: eu-west-2
  secretName: "rds!db-95094671-a261-440f-9aa1-4207b1215acd"
  k8sSecretName: "rds-credentials"
  refreshInterval: "1h"




backend:
  name: jjhealth-backend
  replicas: 1
  image:
    repository: ghcr.io/anigbojohnson/jjhealth-backend
    tag: latest
  service:
    type: ClusterIP
    port: 80

worker:
  name: laravel-worker
  replicas: 2   # initial

  image:
    repository: mycompany/laravel
    tag: latest

  autoscaling:
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
    

ingress:
  enabled: true
  className: alb

  annotations:
    alb.ingress.kubernetes.io/security-groups: sg-035cb149cbfb797a8
    alb.ingress.kubernetes.io/group.name: jjhealth-group
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/success-codes: "200"
    alb.ingress.kubernetes.io/load-balancer-attributes: deletion_protection.enabled=false
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
   
  paths:
    - path: /
      pathType: Prefix
      service:
        name: jjhealth-backend
        port: 80
    - path: /health
      pathType: Prefix
      service:
        name: jjhealth-backend
        port: 80


serviceAccount:
  create: false
  name: jjhealth-sa
  automount: true
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::869868778582:role/jjhealth-backend-secrets-role-1


hpa:
  enabled: true
  name: jjhealth-backend-hpa
  target: jjhealth-backend
  minReplicas: 1
  maxReplicas: 5
  cpuUtilization: 50


networkPolicy:
  enabled: true

  ingressNamespace: ingress-nginx

  postgres:
    port: 5432

  rdsCidrs:
    - 10.0.5.0/24
    - 10.0.6.0/24

