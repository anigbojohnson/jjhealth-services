apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base

# Optional: Set production-specific namespace, labels, etc.
namespace: development

images:
- name: ghcr.io/anigbojohnson/jjhealth-backend
  newName: ghcr.io/anigbojohnson/jjhealth-backend
  newTag: d9ba1b85e1ae1117987c287e42dda88788e268ab

# Delete HPA in development
patches:
- path: patch-backend-replicas.yaml
  target:
    kind: Deployment
    name: jjhealth-backend
- path: delete-hpa.yaml
  target:
    kind: HorizontalPodAutoscaler
