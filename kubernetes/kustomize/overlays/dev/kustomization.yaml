apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base

# Optional: Set production-specific namespace, labels, etc.
namespace: development

images:
- name: ghcr.io/anigbojohnson/jjhealth-backend
  newName: ghcr.io/anigbojohnson/jjhealth-backend
  newTag: 7782b9265c6c82dea2bf9ef47533ba0a145de07b
- name: repo/backend
  newName: repo/backend
  newTag: v2.3.1

# The key part: Patch to override replicas on the backend Deployment

# Delete HPA in development
patches:
- path: patch-backend-replicas.yaml
  target:
    kind: Deployment
    name: jjhealth-backend
- path: delete-hpa.yaml
  target:
    kind: HorizontalPodAutoscaler
