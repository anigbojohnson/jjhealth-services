#   run: |
#     mkdir -p .trivy/templates
#     curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl \
#       -o .trivy/templates/html.tpl

# - name: Trivy Image Scan (HTML Report)
#   uses: aquasecurity/trivy-action@0.24.0
#   with:
#     image-ref: ghcr.io/${{ github.repository_owner }}/jjhealth-backend:${{ github.sha }}
#     format: 'template'
#     template: '@.trivy/templates/html.tpl'
#     output: trivy-report.html
#     severity: 'CRITICAL,HIGH'
#     exit-code: '1'

# - name: Upload Trivy report
#   if: always()
#   uses: actions/upload-artifact@v4
#   with:
#     name: trivy-html-report
#     path: trivy-report.html

     
      - name: Update dev kustomize image tag
        run: |
          cd   ${{ env.KUSTOMIZE_DIR}} || { echo "Kustomize dev overlay not found"; exit 1; }
          kustomize edit set image \
          ghcr.io/${{ github.repository_owner }}/jjhealth-backend=ghcr.io/${{ github.repository_owner }}/jjhealth-backend:${{ github.sha }}

      - name: Commit and push kustomize change
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git diff --quiet; then
            echo "No kustomize changes to commit"
            exit 0
          fi


          git add ${{ env.KUSTOMIZE_DIR}}/kustomization.yaml
          git commit -m "chore(dev): deploy backend image ${{ github.sha }}"
          git pull --rebase origin main

          git push

  