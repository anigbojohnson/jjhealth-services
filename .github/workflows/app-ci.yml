name: CI - Build & Secure JJHealth

env:
  APP: application
  IMAGE_NAME: ${{ github.repository_owner }}/jjhealth-backend:${{ github.sha }}
  KUSTOMIZE_DIR: kubernetes/kustomize/overlays/dev

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'kubernetes/kustomize/**'
  pull_request:
    branches:
      - main

jobs:
  sast-scan:
    name: Application Static & Dependency Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          coverage: none
          tools: composer

      - name: Install dependencies
        run: |
         cd ${{ env.APP }}
         composer install --no-interaction --no-progress --prefer-dist

   #   - name: Run Psalm (SAST)
   #     run: |
   #      cd application
   #      vendor/bin/psalm --output-format=github

  #    - name: PHPStan Static Analysis
  #      working-directory: application
  #      run: vendor/bin/phpstan analyse --error-format=github

      - name: Composer Dependency Security
        uses: symfonycorp/security-checker-action@v5
        with:
          lock: ${{ env.APP }}/composer.lock


  build-and-scan:
    name: Build, Push & Scan Image
    needs: sast-scan
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: true
      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/jjhealth-backend:${{ github.sha }}


          
