name: Terraform deployment for jjhealth infrastructure 

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform/root

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Fetch Keys from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: http://18.168.202.100:8200
          role: gh-actions-role
          jwtGithubAudience: https://github.com/anigbojohnson
          method: jwt
          secrets: |
            aws/creds/terraform-role access_key | AWS_ACCESS_KEY_ID ;
            aws/creds/terraform-role secret_key | AWS_SECRET_ACCESS_KEY;

      - name: Wait for AWS credentials to propagate
        run: sleep 10

      - name: Verify AWS credentials
        run: aws sts get-caller-identity

      - name: Clean Terraform Directory
        run: rm -rf .terraform

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: destroy id lock
        run: terraform force-unlock -force d9d5c631-6937-8945-8903-f3e966c7123b

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform destroy
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform destroy -auto-approve


